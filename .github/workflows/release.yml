name: Release

# Trigger: pushing a tag like v0.1.0, v0.2.0, etc.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREFIX="claude-code-agents-ui-${VERSION}"

          # tar.gz preserves executable bits — preferred for macOS/Linux
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "${PREFIX}.tar.gz" HEAD

          # zip for Windows users. Executable bits not preserved, but .bat works fine.
          git archive --format=zip --prefix="${PREFIX}/" -o "${PREFIX}.zip" HEAD

          echo "Built:"
          ls -lh "${PREFIX}.tar.gz" "${PREFIX}.zip"

      - name: Extract release notes from tag
        id: notes
        run: |
          # Use annotated-tag message as release body. Fallback if tag is lightweight.
          BODY=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "$BODY" ]; then
            BODY="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$BODY"
            echo ''
            echo '## Download'
            echo ''
            echo '- **macOS / Linux:** download the `.tar.gz` — executable bits on launcher scripts are preserved.'
            echo '- **Windows:** download the `.zip`.'
            echo ''
            echo 'Extract the archive, then double-click the launcher for your OS (`Start-macOS.command`, `Start-Windows.bat`, or `Start-Linux.sh`).'
            echo ''
            echo 'See [LAUNCHERS.md](https://github.com/${{ github.repository }}/blob/master/LAUNCHERS.md) for first-run details (Gatekeeper / SmartScreen).'
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            claude-code-agents-ui-${{ github.ref_name }}.tar.gz
            claude-code-agents-ui-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
